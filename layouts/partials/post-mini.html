<!-- Mini Post -->
<article class="mini-post">
    <header>
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <time class="published" datetime="2015-10-20">{{ .PublishDate.Format "January 2, 2006" }}</time>
    </header>
    <a href="{{ .Permalink }}" class="image"><img src="/images/pic04.jpg" alt="Feature image of {{ .Title }}" height="215"/></a>
</article>
