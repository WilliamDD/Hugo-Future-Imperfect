<html lang="{{ .Page.Language | default " nl-nl" }}">

<head>
    {{- partial "head.html" . -}}
</head>

<body class="is-preload">

    <!-- Wrapper -->
    <div id="wrapper">

        <!-- Header -->
        <header id="header">
            <h1><a href="/">{{ .Site.Title }}</a></h1>
            {{- partial "links.html" . -}}
            {{- partial "menu.html" . -}}
        </header>

        <!-- Menu -->
        <section id="menu">
            <!-- Links -->
            <section>
                <ul class="links">
                    {{ range .Site.Menus.main }}
                    <li>
                        <a href="{{ .URL }}">
                            <h3>{{ .Name }}</h3>
                        </a>
                    </li>
                    {{ end }}
                </ul>
            </section>
        </section>

        {{- block "main" . }}{{- end }}
    </div>

    <!-- Scripts -->
    <script src="/assets/js/jquery.min.js"></script>
    <script src="/assets/js/browser.min.js"></script>
    <script src="/assets/js/breakpoints.min.js"></script>
    <script src="/assets/js/util.js"></script>
    <script src="/assets/js/main.js"></script>

</body>

</html>
